  #     lxc stop $instance_name || true
  #   systems:
  #     - ubuntu-noble:
  multipass:
    type: adhoc
    allocate: |
      sleep 0.$RANDOM  # Minimize chances of a race condition
      mkdir -p $HOME/.spread
      export counter_file="$HOME/.spread/multipass-count"
      instance_num=$(flock -x $counter_file bash -c '
        [ -s $counter_file ] || echo 0 > $counter_file
        num=$(< $counter_file)
        echo $num
        echo $(( $num + 1 )) > $counter_file')

      multipass_image=$(echo ${SPREAD_SYSTEM} | sed -e s/ubuntu-// -e s/-64//)

      system=$(echo "${SPREAD_SYSTEM}" | tr . -)
      instance_name="spread-${SPREAD_BACKEND}-${instance_num}-${system}"

      multipass launch --cpus 4 --disk 40G --memory 8G --name "${instance_name}" "${multipass_image}"

      # Enable PasswordAuthentication for root over SSH.
      multipass exec "$instance_name" -- \
        sudo sh -c "echo root:${SPREAD_PASSWORD} | sudo chpasswd"
      multipass exec "$instance_name" -- \
        sudo sh -c \
        "if [ -d /etc/ssh/sshd_config.d/ ]
        then
          echo 'PasswordAuthentication yes' > /etc/ssh/sshd_config.d/10-spread.conf
          echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config.d/10-spread.conf
        else
          sed -i /etc/ssh/sshd_config -E -e 's/^#?PasswordAuthentication.*/PasswordAuthentication yes/' -e 's/^#?PermitRootLogin.*/PermitRootLogin yes/'
        fi"
      multipass exec "$instance_name" -- \
        sudo systemctl restart ssh

      # Get the IP from the instance
      ip=$(multipass info --format csv "$instance_name" | tail -1 | cut -d\, -f3)
      ADDRESS "$ip"
    discard: |
      instance_name=$(multipass list --format csv | grep $SPREAD_SYSTEM_ADDRESS | cut -f1 -d\,)
      multipass delete --purge "${instance_name}"
    systems:
      - ubuntu-20.04-64:
          workers: 4
      - ubuntu-22.04-64:
          workers: 4
      - ubuntu-24.04-64:
          workers: 4
      - ubuntu-25.10-64:
          workers: 4
    prepare: |
      # Ubuntu 20.04 requires a newer kernel, so we prepare it with an HWE kernel and
      # reboot. Note that we're only doing this here because for OpenStack we
      # specifically request an HWE kernel.
      if [ "${SPREAD_SYSTEM}" = "ubuntu-20.04-64" ] && [ "${SPREAD_REBOOT:-0}" = "0" ]; then
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get --yes install linux-image-generic-hwe-20.04
        REBOOT
      fi
  craft:
    type: adhoc
    allocate: "false"
    systems:
      - ubuntu-20.04-64:
      - ubuntu-22.04-64:
      - ubuntu-24.04-64:
      - ubuntu-25.10-64:

prepare: |
  #shellcheck source=tests/spread/tools.sh
  . "$PROJECT_PATH/tests/spread/tools.sh"
  if [ -n "${HTTP_PROXY:-}" ]; then
    # The snapd daemon doesn't see the environment variables, so we must modify its config
    # to use a proxy with it. Came from:
    # https://github.com/canonical/snapd/blob/619cc925793591348db21bb45fa4af65288d2c42/tests/lib/prepare.sh#L90
    tools.setup_snapd_proxy
  fi

  sudo snap wait system seed.loaded
  # IDK why but if we don't sleep after this we get:
  # error: cannot install "snapd": Post "https://api.snapcraft.io/v2/snaps/refresh": context canceled
  sleep 4
  sudo snap install snapd || sudo snap refresh snapd
  sudo snap wait system seed.loaded

  sudo snap install --dangerous --classic tests/spread/*$(dpkg --print-architecture).snap

  # Select older LXD channels for older bases.
  . /etc/os-release
  case "${VERSION_ID}" in
    [0-9][24680].10 | [0-9][13579].*)  # Use the latest track for interim releases.
      lxd_channel="latest/beta"
      ;;
    20.04)
      lxd_channel="4.0/beta"
      ;;
    22.04)
      lxd_channel="5.0/beta"
      ;;
    24.04)
      lxd_channel="5.21/beta"
      ;;
    26.04)
      lxd_channel="6/beta"
      ;;
    *)
      echo "Please select an LXD channel for this LTS release!" >> /dev/stderr
      # exit 1
      ;;
  esac
  if snap list lxd; then
    snap refresh --channel=${lxd_channel} lxd
  else
    snap install --channel=${lxd_channel} lxd
  fi

  # Initialize LXD; some tests need it ready *before* testcraft is called
  lxd init --auto

  if [ -n "${HTTP_PROXY:-}" ]; then
    # Lxd either can't access or doesn't fallback to the environment variables,
    # so we must set them. This is needed to download remote images.
    lxc config set core.proxy_http $HTTP_PROXY
    lxc config set core.proxy_https $HTTPS_PROXY
    lxc config set core.proxy_ignore_hosts $NO_PROXY
  fi

  tempfile="$(mktemp)"
  if ! apt-get update > "$tempfile" 2>&1; then
      cat "$tempfile"
      exit 1
  fi

  apt-get --yes install jq

restore-each: |
  testcraft clean || true

suites:
  tests/spread/testcraft/:
    summary: Tests for testcraft core functionality

  tests/spread/partitioncraft/:
    summary: Tests for partitioncraft (app with partitions enabled)
    prepare: |
      sudo snap alias testcraft.partitioncraft partitioncraft

  tests/spread/witchcraft/:
    summary: Tests for witchcraft (app with many features enabled)
    prepare: |
      sudo snap alias testcraft.witchcraft witchcraft

  tests/spread/pro/:
    summary: manually-triggered when Ubuntu Pro token is available
    manual: true
    # The ability to attach pro to a LXD instance is only present on LXD 5.21+
    # These tests install older versions of LXD for systems lower than 24.04, so
    # restrict tests just to the systems that we can expect to support this
    # piece of the pro puzzle
    systems:
      - ubuntu-24.04*
    environment:
      UBUNTU_PRO_TOKEN: '$(HOST: echo "$UBUNTU_PRO_TOKEN")'
    prepare: |
      sudo snap alias testcraft.witchcraft witchcraft

      # Enable Ubuntu Pro
      sudo pro config set http_proxy="$http_proxy"
      sudo pro config set https_proxy="$https_proxy"
      sudo pro attach --no-auto-enable $UBUNTU_PRO_TOKEN

      # Enable guest attachment so that Witchcraft can enable Pro on the instances
      sudo pro config set lxd_guest_attach=available
      sudo snap restart lxd
    restore: |
      sudo pro detach --assume-yes || true
