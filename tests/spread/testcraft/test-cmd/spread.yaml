project: test-cmd

environment:
  HTTP_PROXY: "$HTTP_PROXY"
  http_proxy: "$http_proxy"
  HTTPS_PROXY: "$HTTPS_PROXY"
  https_proxy: "$https_proxy"
  NO_PROXY: "$NO_PROXY"
  no_proxy: "$no_proxy"

backends:
  craft:
    type: craft
    allocate: "false"
    systems:
      - ubuntu-25.10:
      - ubuntu-24.04:
      - ubuntu-22.04:
      - ubuntu-20.04:
      - ubuntu-18.04:

  other:
    type: adhoc
    allocate: "false"
    systems:
      - ubuntu-24.04:

prepare: |
  true

suites:
  tests/spread/my-suite/:
    summary: A basic suite of spread tests.
