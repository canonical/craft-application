project: test-cmd

backends:
  craft:
    type: craft
    allocate: "false"
    systems:
      - ubuntu-25.10:
      - ubuntu-24.04:
      - ubuntu-22.04:
      - ubuntu-20.04:
      - ubuntu-18.04:

  other:
    type: adhoc
    allocate: "false"
    systems:
      - ubuntu-24.04:

prepare: |
  true

suites:
  tests/spread/my-suite/:
    summary: A basic suite of spread tests.
    environment:
      HTTP_PROXY: '$(HOST: echo "$HTTP_PROXY")'
      http_proxy: '$(HOST: echo "$http_proxy")'
      HTTPS_PROXY: '$(HOST: echo "$HTTPS_PROXY")'
      https_proxy: '$(HOST: echo "$https_proxy")'
      NO_PROXY: '$(HOST: echo "$NO_PROXY")'
      no_proxy: '$(HOST: echo "$no_proxy")'

